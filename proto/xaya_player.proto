syntax = "proto2";
option cc_enable_arenas = true;

package pxd.proto;

/**
 * General data associated to an xaya name account.
 */
message XayaPlayer
{
  /* Fields 1 (notused), 2 (role), 5 (xayaname), 6 (ftuestate) were dead
     legacy pre-Polygon player fields, never read; dropped at the Polygon fresh
     relaunch.  Reserved so the wire tags are never reused. */
  reserved 1, 2, 5, 6;

  /**
   * vCHI based value
   */ 
  optional uint64 balance = 3;
  
  /* Tag 4 was burnsale_balance (vCHI); retired with the burnsale removal. */
  reserved 4;

  /* H3 / Stage 2b: ongoing operations moved OUT of the player proto into the
     height-keyed ongoing_operations table (database/ongoings.*).  Field 7 is
     reserved so it is never reused. */
  reserved 7;

  /**
   * Tournaments bookeeping entry
   */
  optional uint32 TournamentsCompleted = 8;   
  
  /**
   * Tournaments bookeeping entry
   */
  optional uint32 TournamentsWon = 9;    
  
  
  /**
   * Values, used in prestige calculation, to show in the front-end
   */
  optional uint32 ValueEpic = 10;
  optional uint32 ValueRare = 11;  
  optional uint32 ValueUncommon = 12;  
  optional uint32 ValueCommon = 13;
  optional uint32 FighterAverage = 14; 
  optional uint32 TournamentPerformance = 15;
  
  /* Tag 16 was SpecialTournamentPrestigeTier; retired with the
     special-tournament feature at the Polygon relaunch. */
  reserved 16;

  /**
   * The player's wallet address (set via the `init` move); the payment
   * receiver for on-chain rewards.
   */
  optional string address = 17;

  /**
   * Append-only counter, +1 for every activity reward credited to this player
   * at resolve (candy / recipe / move / armor / animation).  Rewards auto-credit
   * the moment an activity resolves (no claim tx), so the client detects "new
   * rewards since I last looked" by watching this serial advance rather than by
   * reading now-absent unclaimed-reward rows.  Held recipe-overflow rewards do
   * NOT bump it until they drain into ownership (they aren't in inventory yet).
   */
  optional uint64 rewards_serial = 18;
}
